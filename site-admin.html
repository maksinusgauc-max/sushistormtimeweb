<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Админка меню — Суши Шторм</title>
<style>
:root{--bg:#0d0d0d;--surface:#161616;--card:#1e1e1e;--border:rgba(255,255,255,0.08);--gold:#f0b429;--red:#d63b2f;--green:#3fae54;--text:#f2ede4;--muted:#8a847c}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Manrope',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
.wrap{max-width:820px;margin:0 auto;padding:20px 16px 80px}
.top{display:flex;align-items:center;justify-content:space-between;padding:14px 0 20px;border-bottom:1px solid var(--border);margin-bottom:20px}
.top h1{font-size:18px;font-weight:800}
.top .sub{font-size:12px;color:var(--muted);margin-top:3px}
.btn{border:none;border-radius:8px;padding:11px 16px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
.btn-gold{background:var(--gold);color:#000}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text)}
.input{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--text);font-size:14px;font-family:inherit;outline:none;width:100%}
.input:focus{border-color:rgba(240,180,41,.5)}

/* gate */
#gate{max-width:340px;margin:14vh auto 0;text-align:center}
#gate h2{font-size:20px;font-weight:800;margin-bottom:6px}
#gate p{font-size:13px;color:var(--muted);margin-bottom:20px}
#gate .input{margin-bottom:12px;text-align:center}
#gate .err{color:var(--red);font-size:12px;min-height:16px;margin-top:8px}

/* editor */
.hidden{display:none}
.search{margin-bottom:16px}
.cat-block{margin-bottom:26px}
.cat-title{font-size:12px;letter-spacing:.1em;text-transform:uppercase;color:var(--gold);font-weight:700;margin-bottom:10px}
.row{display:grid;grid-template-columns:1fr 96px 86px 64px;gap:10px;align-items:center;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:8px}
.row.off{opacity:.5}
.row .nm{font-size:14px;font-weight:600;line-height:1.3}
.row .art{font-size:11px;color:var(--muted);margin-top:2px}
.price-wrap{display:flex;align-items:center;gap:4px}
.price-wrap input{width:70px;text-align:right;background:var(--card);border:1px solid var(--border);border-radius:7px;padding:8px;color:var(--text);font-size:14px;font-family:inherit;outline:none}
.price-wrap input:focus{border-color:rgba(240,180,41,.5)}
.price-wrap .cur{font-size:13px;color:var(--muted)}
.avail{display:flex;align-items:center;gap:7px;cursor:pointer;font-size:12px;color:var(--muted);user-select:none}
.avail input{accent-color:var(--green);width:17px;height:17px}
.move{display:flex;gap:5px;justify-content:flex-end}
.move button{width:28px;height:28px;border-radius:7px;border:1px solid var(--border);background:transparent;color:var(--text);cursor:pointer;font-size:14px;line-height:1}
.move button:hover{border-color:var(--gold);color:var(--gold)}
.move button:disabled{opacity:.25;cursor:default}
.saved{outline:2px solid var(--green);transition:outline .2s}
.note{font-size:12px;color:var(--muted);background:rgba(240,180,41,.06);border:1px solid rgba(240,180,41,.18);border-radius:8px;padding:10px 12px;margin-bottom:16px;line-height:1.5}
#toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);background:var(--card);border:1px solid var(--border);border-radius:10px;padding:11px 18px;font-size:13px;opacity:0;transition:all .25s;pointer-events:none;z-index:50}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(max-width:560px){
  .row{grid-template-columns:1fr 80px;gap:8px}
  .row .av-cell,.row .move{grid-column:span 1}
  .move{justify-content:flex-start;margin-top:4px}
}
</style>
</head>
<body>

<!-- Вход -->
<div id="gate">
  <h2>🔐 Админка меню</h2>
  <p>Введите пароль администратора</p>
  <input class="input" id="g-pass" type="password" placeholder="Пароль" autocomplete="current-password">
  <button class="btn btn-gold" style="width:100%" onclick="enter()">Войти</button>
  <div class="err" id="g-err"></div>
</div>

<!-- Редактор -->
<div class="wrap hidden" id="editor">
  <div class="top">
    <div>
      <h1>Меню сайта</h1>
      <div class="sub" id="count"></div>
    </div>
    <button class="btn btn-ghost" onclick="reload()">⟲ Обновить</button>
  </div>
  <div class="note">Меняете цену или наличие — изменения сразу видят все на сайте. Снятая галочка «в наличии» убирает блюдо с сайта (стоп-лист). Стрелки ↑↓ меняют порядок внутри категории. Киоск работает отдельно и здесь не меняется.</div>
  <input class="input search" id="search" placeholder="🔍 Поиск по названию…" oninput="render()">
  <div id="list"></div>
</div>

<div id="toast"></div>

<script>
var ADMIN_PASS = '';   // вводится при входе, в коде не хранится
var DISHES = [];       // текущее меню с сервера

var CAT_LABELS = {
  sets:'Сеты', rolls:'Роллы', mini:'Мини-роллы', baked:'Запечённые', tempura:'Темпурные',
  sushi:'Суши', pizza:'Пицца', salads:'Салаты', hot:'Горячее', soupmussels:'Супы и мидии',
  desserts:'Десерты', drinks:'Напитки', sauces:'Соусы'
};

function toast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(t._h); t._h=setTimeout(function(){ t.classList.remove('show'); }, 1800);
}

// ── Вход ──
document.getElementById('g-pass').addEventListener('keydown', function(e){ if(e.key==='Enter') enter(); });

async function enter(){
  var pass = document.getElementById('g-pass').value;
  var err = document.getElementById('g-err');
  err.textContent='';
  if(!pass){ err.textContent='Введите пароль'; return; }
  try{
    var r = await fetch('/api/admin-login', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ login:'admin', pass: pass })
    });
    var d = await r.json().catch(function(){ return {}; });
    if(d && d.ok){
      ADMIN_PASS = pass;
      document.getElementById('gate').classList.add('hidden');
      document.getElementById('editor').classList.remove('hidden');
      reload();
      return;
    }
    if(d && d.error==='not_configured'){ err.textContent='Вход не настроен (нет ADMIN_PASS в Vercel)'; return; }
    if(d && d.error==='too_many'){ err.textContent='Слишком много попыток, подождите минуту'; return; }
    err.textContent='Неверный пароль';
  }catch(e){ err.textContent='Ошибка соединения'; }
}

// ── Загрузка меню ──
async function reload(){
  try{
    var r = await fetch('/api/menu');
    if(!r.ok){
      if(r.status===503){ toast('Supabase не настроен'); }
      else { toast('Не удалось загрузить меню'); }
      return;
    }
    var data = await r.json();
    if(!Array.isArray(data)){ toast('Сервер вернул не то'); return; }
    DISHES = data;
    document.getElementById('count').textContent = data.length + ' позиций';
    render();
  }catch(e){ toast('Ошибка соединения'); }
}

// ── Отрисовка списка по категориям ──
function render(){
  var q = (document.getElementById('search').value || '').toLowerCase().trim();
  var list = document.getElementById('list');
  // сортировка по cat, затем sort
  var sorted = DISHES.slice().sort(function(a,b){
    if(a.cat!==b.cat) return String(a.cat).localeCompare(String(b.cat));
    return (a.sort||0)-(b.sort||0);
  });
  var byCat = {};
  sorted.forEach(function(d){ (byCat[d.cat]=byCat[d.cat]||[]).push(d); });

  var html = '';
  Object.keys(byCat).forEach(function(cat){
    var items = byCat[cat];
    var visible = q ? items.filter(function(d){ return String(d.name).toLowerCase().indexOf(q)!==-1; }) : items;
    if(!visible.length) return;
    html += '<div class="cat-block"><div class="cat-title">'+esc(CAT_LABELS[cat]||cat)+'</div>';
    visible.forEach(function(d){
      var idxInCat = items.indexOf(d);
      var first = idxInCat===0, last = idxInCat===items.length-1;
      html += ''
        + '<div class="row'+(d.available===false?' off':'')+'" id="row-'+d.id+'">'
        +   '<div><div class="nm">'+esc(d.name)+'</div><div class="art">арт. '+esc(d.article||'—')+'</div></div>'
        +   '<div class="price-wrap"><input type="number" min="0" value="'+(d.price||0)+'" '
        +       'onchange="savePrice('+d.id+', this.value)"><span class="cur">₽</span></div>'
        +   '<label class="avail av-cell"><input type="checkbox" '+(d.available===false?'':'checked')+' '
        +       'onchange="saveAvail('+d.id+', this.checked)"><span>в наличии</span></label>'
        +   '<div class="move">'
        +     '<button onclick="move('+d.id+',-1)" '+(first||q?'disabled':'')+' title="Выше">↑</button>'
        +     '<button onclick="move('+d.id+',1)" '+(last||q?'disabled':'')+' title="Ниже">↓</button>'
        +   '</div>'
        + '</div>';
    });
    html += '</div>';
  });
  list.innerHTML = html || '<p style="color:var(--muted);text-align:center;padding:30px 0">Ничего не найдено</p>';
}

function esc(s){ return String(s===undefined||s===null?'':s).split('&').join('&amp;').split('<').join('&lt;').split('>').join('&gt;').split('"').join('&quot;'); }

function dishById(id){ for(var i=0;i<DISHES.length;i++){ if(DISHES[i].id===id) return DISHES[i]; } return null; }

// ── Сохранение цены ──
async function savePrice(id, val){
  var price = Math.max(0, parseInt(val,10) || 0);
  var ok = await patch({ id:id, price:price });
  if(ok){ var d=dishById(id); if(d) d.price=price; flash(id); toast('Цена сохранена'); }
}

// ── Наличие (стоп-лист) ──
async function saveAvail(id, checked){
  var ok = await patch({ id:id, available: !!checked });
  if(ok){
    var d=dishById(id); if(d) d.available=!!checked;
    var row=document.getElementById('row-'+id); if(row) row.classList.toggle('off', !checked);
    flash(id); toast(checked?'В наличии':'Убрано со страницы (стоп-лист)');
  }
}

// ── Перестановка внутри категории ──
async function move(id, dir){
  var d = dishById(id); if(!d) return;
  var sameCat = DISHES.filter(function(x){ return x.cat===d.cat; })
                      .sort(function(a,b){ return (a.sort||0)-(b.sort||0); });
  var i = sameCat.indexOf(d);
  var j = i + dir;
  if(j<0 || j>=sameCat.length) return;
  var other = sameCat[j];
  var s1 = d.sort||0, s2 = other.sort||0;
  // меняем sort местами на сервере
  var ok1 = await patch({ id:d.id, sort:s2 });
  var ok2 = await patch({ id:other.id, sort:s1 });
  if(ok1 && ok2){ d.sort=s2; other.sort=s1; render(); toast('Порядок изменён'); }
  else { toast('Не удалось переставить'); reload(); }
}

// ── PATCH на сервер ──
async function patch(payload){
  try{
    var r = await fetch('/api/menu', {
      method:'PATCH',
      headers:{ 'Content-Type':'application/json', 'x-admin-pass': ADMIN_PASS },
      body: JSON.stringify(payload)
    });
    if(r.status===401){ toast('Пароль не принят — войдите заново'); return false; }
    if(r.status===503){ toast('Запись не настроена (нет SERVICE_KEY)'); return false; }
    var d = await r.json().catch(function(){ return {}; });
    if(d && d.ok) return true;
    toast('Ошибка сохранения'); return false;
  }catch(e){ toast('Ошибка соединения'); return false; }
}

function flash(id){
  var row=document.getElementById('row-'+id);
  if(!row) return;
  row.classList.add('saved');
  setTimeout(function(){ row.classList.remove('saved'); }, 700);
}
</script>
</body>
</html>
